<!doctype html>

<html lang="en-US">

  <!-- head is not displayed in the web browser when the page is loaded-->
  <head>
    <!-- This charset allows not only english, but other languages to be displayed properly-->
    <meta charset="utf-8" />

    <!-- Adding a simple favcon (icon shown on the tab) currently stored in images folder-->
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon" />

    <!-- This title repsensents the overall HTML doc-->
    <title>My test page</title>

    <!-- CSS and JS are also included in this section-->
    <!-- <link rel="stylesheet" href="style.css" />-->
    <!-- <script src="scripts.js" defer></script>-->

  </head>

  <body>
    <!-- Current page's title-->
    <h1>Simple HTML practice</h1>    
    <p>Before delving into the unknown I <em>decided</em> to first take a few days to <strong>practice</strong></p>
    
    <ul>
      <li><a href="https://www.youtube.com/watch?v=XFkzRNyygfk&list=RDXFkzRNyygfk&start_radio=1" target="_blank">This link opens a new tab to the song im listening to</a></li>
