<!doctype html>
<html lang="en-US">

  <head>
    <!-- This is not displayed in the web browser when the page is loaded, but contains-->
    <!-- metadata-->

    <!-- This charset should in theory allow not only english, but other languages to be displayed properly-->
    <meta charset="utf-8" />

    <!-- Adding a simple favcon (icon shown on the tab) currently stored in images folder-->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon" />

    <!-- This title repsensents the overall HTML doc while h1 generally should only be used-->
    <!-- once per page as the title of the page content-->
    <title>My test page</title>
  </head>

  <body>
    <h1>Simple Tag practice</h1>
    <!-- This is how you write a comment -->
    <p>Before delving into the unknown I decided to first take a few days to <strong>practice</strong></p>
    
    <ul>
      <li><a href="https://www.youtube.com/watch?v=XFkzRNyygfk&list=RDXFkzRNyygfk&start_radio=1">This is the song I'm currently listening to</a></li>
      <li><a href="https://www.youtube.com/watch?v=8UVNT4wvIGY&list=RDXFkzRNyygfk&index=2&pp=8AUB">Next Song</a></li>
    </ul>
  
    <!--  Just checking that other non alphabetic characters can be properly displayed-->
    <p>Japanese Kanjis: Japanese example: ご飯が熱い。</p>
  </body>


</html>
