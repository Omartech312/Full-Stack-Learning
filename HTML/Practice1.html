<!doctype html>

<html lang="en-US">

  <head>
    <!-- head is not displayed in the web browser when the page is loaded-->

    <!-- This charset should allow not only english, but other languages to be displayed properly-->
    <meta charset="utf-8" />

    <!-- Adding a simple favcon (icon shown on the tab) currently stored in images folder-->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon" />

    <!-- This title repsensents the overall HTML doc-->
    <title>My test page</title>
  </head>

  <body>
    <!-- Current page's title-->
    <h1>Simple HTML practice</h1>    
    <p>Before delving into the unknown I decided to first take a few days to <strong>practice</strong></p>
    
    <ul>
      <li><a href="https://www.youtube.com/watch?v=XFkzRNyygfk&list=RDXFkzRNyygfk&start_radio=1" target="_blank">This link opens a new tab to the song im listening to</a></li>
      <li><a href="https://www.youtube.com/watch?v=8UVNT4wvIGY&list=RDXFkzRNyygfk&index=2&pp=8AUB">This link moves your current tab to the next song in my playlist</a></li>
    </ul>
  
    <!-- Just checking that other non alphabetic characters can be properly displayed-->
    <p>Japanese example: ご飯が熱い。</p>
  </body>

</html>
